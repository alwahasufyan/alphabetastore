# Production docker-compose
# Usage:
#   1. Copy backend/.env.example to backend/.env.production and fill all values
#   2. Set POSTGRES_PASSWORD in the environment or a .env file at the repo root
#   3. docker compose -f docker-compose.prod.yml up -d --build

services:

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-alphabeta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-alphabeta_prod_12345}
      POSTGRES_DB: ${POSTGRES_DB:-alphabeta}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/postgres-backup:/scripts:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alphabeta} -d ${POSTGRES_DB:-alphabeta}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5434:5432"
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-alphabeta_redis_12345} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-alphabeta_redis_12345}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6380:6379"
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/.env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-alphabeta}:${POSTGRES_PASSWORD:-alphabeta_prod_12345}@db:5432/${POSTGRES_DB:-alphabeta}?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD:-alphabeta_redis_12345}@redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    ports:
      - "3001:3001"
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3001/api/v1}
        NEXT_PUBLIC_API_URL: http://backend:3001/api/v1
    restart: always
    env_file:
      - ./frontend/.env.production
    environment:
      NODE_ENV: production
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3

  # Daily PostgreSQL backup — dumps to ./backups/ on the host
  db-backup:
    image: postgres:16-alpine
    restart: always
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-alphabeta_prod_12345}
      POSTGRES_USER: ${POSTGRES_USER:-alphabeta}
      POSTGRES_DB: ${POSTGRES_DB:-alphabeta}
      POSTGRES_HOST: db
      BACKUP_DIR: /backups
      RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
      - ./scripts/backup-db.sh:/usr/local/bin/backup-db.sh:ro
    entrypoint: >
      sh -c "chmod +x /usr/local/bin/backup-db.sh &&
             while true; do
               /usr/local/bin/backup-db.sh;
               sleep 86400;
             done"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads_data:
